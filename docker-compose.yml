version: "3.9"

services:
    app:
        build:
            context: .
            dockerfile: docker/app/Dockerfile
        container_name: store_app
        volumes:
            - ./:/var/www/html
        depends_on:
            - mysql
        networks:
            - store

    web:
        image: nginx:latest
        container_name: store_web
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - store

    mysql:
        image: mysql:8
        container_name: store_mysql
        restart: always
        ports:
            - "3336:3306"
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_ROOT_PASSWORD: root
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - store

networks:
    store:
        driver: bridge

volumes:
    mysql_data:
